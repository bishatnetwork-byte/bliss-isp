# HotspotPro — reverse proxy template (rendered by scripts/vps-bootstrap.sh)
# Kept here for reference / manual install.
upstream hotspotpro_upstream { server 127.0.0.1:3001; keepalive 32; }

server {
    listen 80;
    listen [::]:80;
    server_name hotspotpro.bliss-isp.online;

    client_max_body_size 25m;

    location / {
        proxy_pass         http://hotspotpro_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
