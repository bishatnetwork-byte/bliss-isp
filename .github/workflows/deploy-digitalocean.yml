name: Deploy HotspotPro to DigitalOcean VPS

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.gitignore']
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  DEPLOY_PATH: ${{ secrets.DO_VPS_DEPLOY_PATH || '/var/www/hotspotpro' }}
  APP_NAME: hotspotpro

jobs:
  deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DO_VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync repo to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' --exclude 'node_modules' --exclude '.output' --exclude 'dist' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.DO_VPS_USER }}@${{ secrets.DO_VPS_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Build & reload on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DO_VPS_USER }}@${{ secrets.DO_VPS_HOST }} bash -se <<'ENDSSH'
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            export NITRO_PRESET=node-server
            export NODE_OPTIONS="--max-old-space-size=4096"
            npm install --legacy-peer-deps
            npm run build
            chmod +x scripts/*.sh || true
            pm2 reload "${{ env.APP_NAME }}" --update-env \
              || pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
            pm2 status
          ENDSSH

      - name: Notify on Telegram
        if: always() && secrets.TELEGRAM_BOT_TOKEN != ''
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"; [ "$STATUS" != "success" ] && ICON="❌"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode=HTML \
            -d text="${ICON} <b>HotspotPro deploy: ${STATUS}</b>%0ACommit: <code>${{ github.sha }}</code>"
