<div id="sell-form">
    <div class="g2" style="align-items:start">
      <div>
        <div class="card">
          <div class="card-hd"><span class="card-title">👤 Customer</span></div>
          <div class="card-body">
            <div class="form-group"><label class="fl frq">Full Name</label><input class="fc" id="s-name" placeholder="John Mukasa"/></div>
            <div class="form-group"><label class="fl frq">Phone Number</label><input class="fc" id="s-phone" placeholder="+256 7XX XXX XXX" type="tel"/></div>
          </div>
        </div>
        <div class="card">
          <div class="card-hd"><span class="card-title">💳 Payment Method</span></div>
          <div class="card-body">
            <div class="pay-opt sel" data-m="MTN MoMo" onclick="selMethod(this)"><div class="pay-logo mtn">MTN</div><div><div class="pay-nm">MTN Mobile Money</div><div class="pay-inf" id="mtn-inf">Dial *165*3# · PayBill 777123</div></div><span class="pay-ck">✓</span></div>
            <div class="pay-opt" data-m="Airtel Money" onclick="selMethod(this)"><div class="pay-logo airtel">AIR</div><div><div class="pay-nm">Airtel Money</div><div class="pay-inf" id="air-inf">Dial *185*9# · PayBill 888456</div></div><span class="pay-ck">✓</span></div>
            <div class="pay-opt" data-m="Cash" onclick="selMethod(this)"><div class="pay-logo cash">CASH</div><div><div class="pay-nm">Cash</div><div class="pay-inf">Manual cash collection</div></div><span class="pay-ck">✓</span></div>
            <div id="ref-row" style="margin-top:10px"><label class="fl">Transaction Reference</label><input class="fc" id="s-ref" placeholder="e.g. MPS2506150912"/></div>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-hd"><span class="card-title">📶 Select Plan</span></div>
          <div class="card-body"><div class="plan-grid" id="sell-plans"></div></div>
        </div>
        <div class="card" id="sell-summary" style="display:none">
          <div class="card-hd"><span class="card-title">🧾 Order Summary</span></div>
          <div class="card-body"><div id="sell-summary-rows"></div><button class="btn btn-g" style="width:100%;margin-top:14px;padding:10px;font-size:13px" onclick="doSell()">✔ Confirm & Generate Voucher</button></div>
        </div>
      </div>
    </div>
  </div>
  <div id="sell-result" style="display:none">
    <div class="alert ag"><span class="al-ico">✅</span>Voucher generated and payment recorded!</div>
    <div class="card" style="max-width:500px;margin:0 auto">
      <div class="card-hd"><span class="card-title">🎫 Voucher Ready</span><span class="badge bg-green">Active</span></div>
      <div class="card-body" style="text-align:center">
        <div style="font-size:12px;color:var(--t3)" id="r-cust"></div>
        <div style="font-size:11px;color:var(--t4);margin-top:2px" id="r-plan"></div>
        <div style="margin:14px 0;background:var(--bg0);border:2px dashed var(--border);border-radius:10px;padding:16px">
          <div style="font-size:9px;color:var(--t4);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">VOUCHER CODE</div>
          <div class="mono" style="font-size:28px;font-weight:900;color:var(--green);letter-spacing:4px" id="r-code">----</div>
          <div style="font-size:10px;color:var(--t4);margin-top:5px" id="r-exp"></div>
        </div>
        <div style="background:var(--bg0);border:1px solid var(--border);border-radius:8px;padding:10px;margin:10px 0;text-align:left">
          <div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">SMS READY TO SEND</div>
          <div style="font-size:11px;color:var(--blue);font-family:monospace;line-height:1.7" id="r-sms"></div>
        </div>
        <div class="btn-row" style="justify-content:center">
          <button class="btn btn-g" onclick="doSendSMS()">📱 Send SMS</button>
          <button class="btn btn-s" onclick="doPrint()">🖨️ Print</button>
          <button class="btn btn-p" onclick="resetSell()">＋ New Sale</button>
        </div>
      </div>
    </div>
  </div>
