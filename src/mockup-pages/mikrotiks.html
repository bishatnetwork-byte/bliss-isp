<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="font-size:13px;color:var(--t3)">Manage all your MikroTik routers from one place</div>
    <div class="btn-row">
      <button class="btn btn-v" onclick="showWireguardOnboardModal()">⚡ Add Router (Behind NAT / WireGuard)</button>
      <button class="btn btn-p" onclick="showAddMkModal()">＋ Add Existing Router</button>
    </div>
  </div>
  <div id="mk-devices-list"></div>
  <div class="card" style="margin-top:4px">

      <div class="alert ai"><span class="al-ico">ℹ️</span>Run these commands in MikroTik terminal to enable API access.</div>
