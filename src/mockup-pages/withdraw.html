<div class="g2" style="align-items:start">
    <div>
      <div class="wallet-card">
        <div class="wallet-lbl">Available Wallet Balance</div>
        <div class="wallet-bal" id="wd-balance">UGX 0</div>
        <div class="wallet-sub">Withdrawable to MTN or Airtel Mobile Money</div>
        <div style="position:absolute;right:22px;top:50%;transform:translateY(-50%);font-size:40px;opacity:.15">🏧</div>
      </div>
      <div class="card">
        <div class="card-hd"><span class="card-title">🏧 Withdraw to Mobile Money</span></div>
        <div class="card-body">
          <div id="wd-passcode-note" style="margin-bottom:14px"></div>
          <div style="font-size:11px;font-weight:700;color:var(--t3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">Choose Network</div>
          <div class="credit-method">
            <div class="credit-opt sel" data-wm="mtn" onclick="selWdMethod(this)"><span class="credit-icon">📱</span>MTN MoMo</div>
            <div class="credit-opt" data-wm="airtel" onclick="selWdMethod(this)"><span class="credit-icon">📱</span>Airtel Money</div>
          </div>
          <div class="form-group"><label class="fl frq">Receiving Phone Number</label><input class="fc" id="wd-phone" placeholder="+256 7XX XXX XXX" type="tel"/></div>
          <div class="form-group"><label class="fl frq">Amount to Withdraw (UGX)</label><input class="fc" type="number" id="wd-amount" placeholder="50000" oninput="updateWdCalc()"/></div>
          <div class="alert ai" id="wd-calc" style="display:none"><span class="al-ico">🧮</span><span id="wd-calc-text"></span></div>
          <button class="btn btn-g" id="wd-submit-btn" style="width:100%" onclick="doWithdraw()">🏧 Withdraw Now</button>
          <div class="fhint" style="margin-top:8px" id="wd-fee-note"></div>
        </div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-hd"><span class="card-title">📋 Withdrawal History</span><span id="wd-attempt-summary"></span></div>
        <div class="tbl-wrap" style="max-height:460px;overflow-y:auto">
          <table>
            <thead><tr><th>ID</th><th>Amount</th><th>Fee</th><th>Net Paid</th><th>Method</th><th>Phone</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="wd-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
